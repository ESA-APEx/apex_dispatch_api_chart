suite: external secret template
release:
  name: apex-dispatch-api
templates:
  - templates/externalsecret.yaml
tests:
  - it: does not render an external secret by default
    asserts:
      - hasDocuments:
          count: 0

  - it: renders an external secret when enabled
    set:
      secrets:
        name: dispatch-secrets
      externalSecret:
        enabled: true
        name: dispatch-api-external-secret
        secretStoreRef:
          kind: ClusterSecretStore
          name: team-vault
        data:
          keycloakClientId:
            key: apex/dispatch
            property: keycloak_client_id
          keycloakClientSecret:
            key: apex/dispatch
            property: keycloak_client_secret
          backends:
            key: apex/dispatch
            property: backends
          databaseUrl:
            key: apex/dispatch
            property: database_url
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ExternalSecret
      - equal:
          path: metadata.name
          value: dispatch-api-external-secret
      - equal:
          path: spec.secretStoreRef.name
          value: team-vault
      - equal:
          path: spec.target.name
          value: dispatch-secrets
      - equal:
          path: spec.data[3].secretKey
          value: DATABASE_URL
      - equal:
          path: spec.data[3].remoteRef.property
          value: database_url
