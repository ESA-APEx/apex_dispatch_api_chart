suite: serviceaccount template
release:
  name: apex-dispatch-api
templates:
  - templates/serviceaccount.yaml
tests:
  - it: does not render a serviceaccount by default
    asserts:
      - hasDocuments:
          count: 0

  - it: renders a serviceaccount when enabled and uses serviceAccount.name
    set:
      serviceAccount:
        create: true
        name: dispatch-api-service-account
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: dispatch-api-service-account

  - it: serviceAccount.name is preferred for created ServiceAccount
    set:
      serviceAccount:
        create: true
        name: apex-runtime-sa
    asserts:
      - equal:
          path: metadata.name
          value: apex-runtime-sa

  - it: falls back to release fullname when create is true and name is empty
    set:
      serviceAccount:
        create: true
        name: ""
        existingName: namespace-runtime-sa
    asserts:
      - equal:
          path: metadata.name
          value: apex-dispatch-api
