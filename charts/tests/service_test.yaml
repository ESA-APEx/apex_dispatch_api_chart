suite: knative service template
release:
  name: apex-dispatch-api
templates:
  - templates/service.yaml
tests:
  - it: renders a knative service with default settings
    asserts:
      - isAPIVersion:
          of: serving.knative.dev/v1
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: apex-dispatch-api
      - equal:
          path: spec.template.spec.containerConcurrency
          value: 0
      - equal:
          path: spec.template.spec.timeoutSeconds
          value: 300
      - equal:
          path: spec.template.spec.serviceAccountName
          value: dispatch-api-service-account
      - equal:
          path: spec.template.spec.containers[0].image
          value: apex-dispatch-api:latest
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 8000
      - equal:
          path: spec.template.metadata.annotations["autoscaling.knative.dev/min-scale"]
          value: "0"
      - equal:
          path: spec.template.metadata.annotations["autoscaling.knative.dev/max-scale"]
          value: "3"
      - equal:
          path: spec.template.spec.containers[0].envFrom[0].configMapRef.name
          value: apex-dispatch-api-config
      - equal:
          path: spec.template.spec.containers[0].env[0].valueFrom.secretKeyRef.name
          value: apex-dispatch-api-secrets
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DATABASE_URL
            valueFrom:
              secretKeyRef:
                name: apex-dispatch-api-secrets
                key: DATABASE_URL
                optional: true
      - notExists:
          path: spec.template.spec.containers[0].readinessProbe

  - it: renders service overrides including probes and extra env
    set:
      serviceAccount:
        name: apex-runtime-sa
      image:
        repository: registry.example.org/apex-dispatch-api
        tag: "2.0.0"
        pullSecrets:
          - name: regcred
      service:
        port: 9000
      knative:
        minScale: 1
        maxScale: 8
        containerConcurrency: 25
        timeoutSeconds: 120
        annotations:
          networking.knative.dev/visibility: cluster-local
        revision:
          annotations:
            autoscaling.knative.dev/metric: concurrency
          labels:
            app.kubernetes.io/component: api
      probes:
        enabled: true
        readiness:
          httpGet:
            path: /health
            port: 9000
          initialDelaySeconds: 2
          periodSeconds: 5
        liveness:
          httpGet:
            path: /health
            port: 9000
          initialDelaySeconds: 4
          periodSeconds: 9
      extraEnv:
        - name: LOG_LEVEL
          value: debug
      extraEnvFrom:
        - secretRef:
            name: shared-env
    asserts:
      - equal:
          path: metadata.annotations["networking.knative.dev/visibility"]
          value: cluster-local
      - equal:
          path: spec.template.metadata.annotations["autoscaling.knative.dev/min-scale"]
          value: "1"
      - equal:
          path: spec.template.metadata.annotations["autoscaling.knative.dev/max-scale"]
          value: "8"
      - equal:
          path: spec.template.metadata.annotations["autoscaling.knative.dev/metric"]
          value: concurrency
      - equal:
          path: spec.template.metadata.labels["app.kubernetes.io/component"]
          value: api
      - equal:
          path: spec.template.spec.containerConcurrency
          value: 25
      - equal:
          path: spec.template.spec.timeoutSeconds
          value: 120
      - equal:
          path: spec.template.spec.serviceAccountName
          value: apex-runtime-sa
      - equal:
          path: spec.template.spec.imagePullSecrets[0].name
          value: regcred
      - equal:
          path: spec.template.spec.containers[0].image
          value: registry.example.org/apex-dispatch-api:2.0.0
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 9000
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: LOG_LEVEL
            value: debug
      - equal:
          path: spec.template.spec.containers[0].envFrom[1].secretRef.name
          value: shared-env
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.port
          value: 9000
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.periodSeconds
          value: 9

  - it: uses serviceAccount.existingName when create is false
    set:
      serviceAccount:
        create: false
        existingName: namespace-runtime-sa
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: namespace-runtime-sa
