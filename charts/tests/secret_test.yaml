suite: chart secret
release:
  name: apex-dispatch-api
templates:
  - templates/secret.yaml
tests:
  - it: does not render a secret by default
    asserts:
      - hasDocuments:
          count: 0

  - it: renders a secret when creation is enabled
    set:
      secrets:
        create: true
        name: dispatch-secrets
        keycloakClientId: client-id
        keycloakClientSecret: client-secret
        backends: '{"backend.example.org":{"auth_method":"none"}}'
        databaseUrl: postgresql+psycopg2://user:pass@db.example.org:5432/apex_db
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: dispatch-secrets
      - equal:
          path: stringData.KEYCLOAK_CLIENT_ID
          value: client-id
      - equal:
          path: stringData.KEYCLOAK_CLIENT_SECRET
          value: client-secret
      - equal:
          path: stringData.BACKENDS
          value: '{"backend.example.org":{"auth_method":"none"}}'
      - equal:
          path: stringData.DATABASE_URL
          value: postgresql+psycopg2://user:pass@db.example.org:5432/apex_db
