# Override the chart name used in resource labels and names.
nameOverride: ""
# Override the fully qualified resource name generated by the chart.
fullnameOverride: ""

serviceAccountName: "dispatch-api-service-account"

image:
  # Container image repository for the FastAPI service.
  repository: apex-dispatch-api
  # Container image tag for the FastAPI service.
  tag: latest
  # Image pull policy applied to the Knative service container.
  pullPolicy: IfNotPresent
  # Optional image pull secrets passed to spec.template.spec.imagePullSecrets.
  pullSecrets: []

service:
  # Container port exposed by the FastAPI application.
  port: 8000

knative:
  # Extra annotations added to the top-level Knative Service metadata.
  annotations: {}
  # Extra labels added to the top-level Knative Service metadata.
  labels: {}
  # Lower autoscaling bound for Knative revisions.
  minScale: 0
  # Upper autoscaling bound for Knative revisions.
  maxScale: 3
  # Maximum concurrent requests per container. 0 means Knative default behavior.
  containerConcurrency: 0
  # Request timeout in seconds for a Knative revision.
  timeoutSeconds: 300
  revision:
    # Extra annotations added to the Knative revision template metadata.
    annotations: {}
    # Extra labels added to the Knative revision template metadata.
    labels: {}

app:
  # APP_NAME exposed to the FastAPI application through the ConfigMap.
  name: "APEx Dispatch API"
  # APP_DESCRIPTION exposed to the FastAPI application through the ConfigMap.
  description: ""
  # APP_ENV exposed to the FastAPI application through the ConfigMap.
  environment: "development"
  # APP_VERSION exposed to the FastAPI application through the ConfigMap.
  version: "development"
  # CORS_ALLOWED_ORIGINS exposed to the FastAPI application through the ConfigMap.
  corsAllowedOrigins: "*"

keycloak:
  # KEYCLOAK_HOST exposed to the FastAPI application through the ConfigMap.
  host: "auth.dev.apex.esa.int"
  # KEYCLOAK_REALM exposed to the FastAPI application through the ConfigMap.
  realm: "apex"

secrets:
  # When true, the chart creates the Kubernetes Secret from the values below.
  # When false, an existing secret named by secrets.name must already exist.
  create: false
  # Name of the Kubernetes Secret referenced by the FastAPI container.
  name: apex-dispatch-api-secrets
  # Used only when secrets.create=true.
  # Written to the generated Kubernetes Secret as KEYCLOAK_CLIENT_ID and injected
  # into the FastAPI container as the KEYCLOAK_CLIENT_ID environment variable.
  keycloakClientId: ""
  # Used only when secrets.create=true.
  # Written to the generated Kubernetes Secret as KEYCLOAK_CLIENT_SECRET and
  # injected into the FastAPI container as the KEYCLOAK_CLIENT_SECRET environment
  # variable.
  keycloakClientSecret: ""
  # Used only when secrets.create=true.
  # Written to the generated Kubernetes Secret as BACKENDS and injected into the
  # FastAPI container as the BACKENDS environment variable.
  backends: ""

# Optional CPU and memory requests and limits for the FastAPI container.
resources: {}

# Optional node selection rules for the Knative revision pod.
nodeSelector: {}

# Optional tolerations for the Knative revision pod.
tolerations: []

# Optional affinity rules for the Knative revision pod.
affinity: {}

# Extra environment variables appended to the container env list.
extraEnv: []
# Extra envFrom entries appended after the generated ConfigMap reference.
extraEnvFrom: []

probes:
  # Enable readiness and liveness probes on the FastAPI container.
  enabled: false
  readiness:
    # HTTP path used by the readiness probe.
    httpGet:
      path: /health
      # Probe port. This should match the container port used by the service.
      port: 8000
    # Delay before the first readiness probe runs.
    initialDelaySeconds: 5
    # Interval between readiness probe checks.
    periodSeconds: 10
  liveness:
    # HTTP path used by the liveness probe.
    httpGet:
      path: /health
      # Probe port. This should match the container port used by the service.
      port: 8000
    # Delay before the first liveness probe runs.
    initialDelaySeconds: 10
    # Interval between liveness probe checks.
    periodSeconds: 20
