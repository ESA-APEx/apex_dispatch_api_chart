# Override the chart name used in resource labels and names.
nameOverride: ""
# Override the fully qualified resource name generated by the chart.
fullnameOverride: ""

serviceAccount:
  # When true, the chart creates a ServiceAccount used by runtime workloads.
  create: true
  # Existing ServiceAccount to use when create=false.
  existingName: ""
  # Name for the ServiceAccount created by this chart when create=true.
  # If empty, the release fullname is used.
  name: "dispatch-api-service-account"
  # Extra annotations added to the generated ServiceAccount metadata.
  annotations: {}
  # Extra labels added to the generated ServiceAccount metadata.
  labels: {}

image:
  # Container image repository for the FastAPI service.
  repository: ""
  # Container image tag for the FastAPI service.
  tag: devlatest
  # Image pull policy applied to the Knative service container.
  pullPolicy: IfNotPresent
  # Optional image pull secrets passed to spec.template.spec.imagePullSecrets.
  pullSecrets:
    - name: apex-secret

service:
  # Container port exposed by the FastAPI application.
  port: 8000

contour:
  # Enable the Contour HTTPProxy resource.
  enabled: true
  # Name override for the HTTPProxy resource. Defaults to chart fullname.
  name: ""
  # Extra annotations added to the HTTPProxy metadata.
  annotations: {}
  # Extra labels added to the HTTPProxy metadata.
  labels: {}
  virtualhost:
    # Public host name exposed by the HTTPProxy.
    fqdn: ""
    tls:
      # Enable TLS termination for the HTTPProxy virtual host.
      enabled: true
      # Kubernetes TLS secret containing certificate and private key.
      secretName: ""
      # Optional minimum TLS protocol version (for example: "1.2").
      minimumProtocolVersion: ""
    # Optional CORS policy applied to the virtual host.
    # Supports all Contour corsPolicy fields: allowOrigin, allowMethods,
    # allowHeaders, exposeHeaders, allowCredentials, allowPrivateNetwork, maxAge.
    # Example:
    #   corsPolicy:
    #     allowCredentials: true
    #     allowHeaders: [authorization, cache-control, content-type]
    #     allowMethods: [GET, POST, OPTIONS]
    #     allowOrigin: ["*"]
    #     allowPrivateNetwork: true
    #     exposeHeaders: [Content-Length, Content-Range]
    #     maxAge: 10m
    corsPolicy: {}

    authorization: {}

  routes: []

knative:
  # Extra annotations added to the top-level Knative Service metadata.
  annotations: {}
  # Extra labels added to the top-level Knative Service metadata.
  labels: {}
  # Lower autoscaling bound for Knative revisions.
  minScale: 1
  # Upper autoscaling bound for Knative revisions.
  maxScale: 3
  # Maximum concurrent requests per container. 0 means Knative default behavior.
  containerConcurrency: 0
  # Request timeout in seconds for a Knative revision.
  timeoutSeconds: 300
  revision:
    # Extra annotations added to the Knative revision template metadata.
    annotations: {}
    # Extra labels added to the Knative revision template metadata.
    labels: {}

app:
  # APP_NAME exposed to the FastAPI application through the ConfigMap.
  name: "APEx Dispatch API"
  # APP_DESCRIPTION exposed to the FastAPI application through the ConfigMap.
  description: "APEx Dispatch Service API to run jobs and upscaling tasks"
  # APP_ENV exposed to the FastAPI application through the ConfigMap.
  environment: "development"
  # APP_VERSION exposed to the FastAPI application through the ConfigMap.
  version: "development"
  # CORS_ALLOWED_ORIGINS exposed to the FastAPI application through the ConfigMap.
  corsAllowedOrigins: "*"

keycloak:
  # KEYCLOAK_HOST exposed to the FastAPI application through the ConfigMap.
  host: ""
  # KEYCLOAK_REALM exposed to the FastAPI application through the ConfigMap.
  realm: ""

secrets:
  # When true, the chart creates the Kubernetes Secret from the values below.
  # When false, an existing secret named by secrets.name must already exist.
  create: false
  # Name of the Kubernetes Secret referenced by the FastAPI container.
  name: apex-dispatch-api-secrets
  # Used only when secrets.create=true.
  # Written to the generated Kubernetes Secret as KEYCLOAK_CLIENT_ID and injected
  # into the FastAPI container as the KEYCLOAK_CLIENT_ID environment variable.
  keycloakClientId: ""
  # Used only when secrets.create=true.
  # Written to the generated Kubernetes Secret as KEYCLOAK_CLIENT_SECRET and
  # injected into the FastAPI container as the KEYCLOAK_CLIENT_SECRET environment
  # variable.
  keycloakClientSecret: ""
  # Used only when secrets.create=true.
  # Written to the generated Kubernetes Secret as BACKENDS and injected into the
  # FastAPI container as the BACKENDS environment variable.
  backends: ""
  # Used only when secrets.create=true.
  # Written to the generated Kubernetes Secret as DATABASE_URL and injected into
  # the FastAPI container as the DATABASE_URL environment variable.
  databaseUrl: ""

externalSecret:
  # When true, the chart renders an ExternalSecret that populates secrets.name.
  enabled: true
  # ExternalSecret name override. Defaults to chart fullname when empty.
  name: "apex-dispatch-api-external-secret"
  # Refresh interval used by External Secrets Operator.
  refreshInterval: 15s
  # Secret store reference used by ExternalSecret.
  secretStoreRef:
    # SecretStore or ClusterSecretStore.
    kind: ClusterSecretStore
    # Name of the store instance.
    name: "vault-backend"
  target:
    # Target secret name. Defaults to secrets.name when empty.
    name: "apex-dispatch-api-secrets"
    # Secret creation policy.
    creationPolicy: Owner
    # Secret deletion policy.
    deletionPolicy: Retain
  data:
    # Remote key references for each application secret.
    keycloakClientId:
      key: "apex-dispatch"
      property: "KEYCLOAK_CLIENT_ID"
    keycloakClientSecret:
      key: "apex-dispatch"
      property: "KEYCLOAK_CLIENT_SECRET"
    backends:
      key: "apex-dispatch"
      property: "BACKENDS"
    databaseUrl:
      key: "apex-dispatch"
      property: "DATABASE_URL"

migration:
  # Run Alembic migrations as a Helm hook Job.
  enabled: false
  # Job name override. Defaults to <fullname>-migrate when empty.
  name: ""
  # Extra labels added to the migration Job metadata.
  labels: {}
  # Extra annotations added to the migration Job metadata.
  annotations: {}
  # Maximum number of retries before the Job is marked failed.
  backoffLimit: 1
  # Optional active deadline in seconds.
  activeDeadlineSeconds: 300
  # Command used by the migration container.
  command:
    - alembic
    - upgrade
    - head
  # Optional args passed to the migration command.
  args: []
  # Extra environment variables appended to the migration container env list.
  extraEnv: []

# Optional CPU and memory requests and limits for the FastAPI container.
resources: {}

# Optional node selection rules for the Knative revision pod.
nodeSelector: {}

# Optional tolerations for the Knative revision pod.
tolerations: []

# Optional affinity rules for the Knative revision pod.
affinity: {}

# Extra environment variables appended to the container env list.
extraEnv: []
# Extra envFrom entries appended after the generated ConfigMap reference.
extraEnvFrom: []

probes:
  # Enable readiness and liveness probes on the FastAPI container.
  enabled: false
  readiness:
    # HTTP path used by the readiness probe.
    httpGet:
      path: /health
      # Probe port. This should match the container port used by the service.
      port: 8000
    # Delay before the first readiness probe runs.
    initialDelaySeconds: 5
    # Interval between readiness probe checks.
    periodSeconds: 10
  liveness:
    # HTTP path used by the liveness probe.
    httpGet:
      path: /health
      # Probe port. This should match the container port used by the service.
      port: 8000
    # Delay before the first liveness probe runs.
    initialDelaySeconds: 10
    # Interval between liveness probe checks.
    periodSeconds: 20
