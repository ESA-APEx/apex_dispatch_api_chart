apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: {{ include "apex-dispatch-api.fullname" . }}
  labels:
    {{- include "apex-dispatch-api.labels" . | nindent 4 }}
    {{- with .Values.knative.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.knative.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  template:
    metadata:
      labels:
        {{- include "apex-dispatch-api.selectorLabels" . | nindent 8 }}
        {{- with .Values.knative.revision.labels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        autoscaling.knative.dev/min-scale: {{ .Values.knative.minScale | quote }}
        autoscaling.knative.dev/max-scale: {{ .Values.knative.maxScale | quote }}
        {{- with .Values.knative.revision.annotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- $serviceAccountName := include "apex-dispatch-api.serviceAccountName" . }}
      containerConcurrency: {{ .Values.knative.containerConcurrency }}
      timeoutSeconds: {{ .Values.knative.timeoutSeconds }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if $serviceAccountName }}
      serviceAccountName: {{ $serviceAccountName }}
      {{- end }}
      containers:
        - name: {{ include "apex-dispatch-api.name" . }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http1
              containerPort: {{ .Values.service.port }}
          envFrom:
            - configMapRef:
                name: {{ include "apex-dispatch-api.fullname" . }}-config
            {{- with .Values.extraEnvFrom }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          env:
            - name: KEYCLOAK_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.name }}
                  key: KEYCLOAK_CLIENT_ID
                  optional: {{ not .Values.secrets.create }}
            - name: KEYCLOAK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.name }}
                  key: KEYCLOAK_CLIENT_SECRET
                  optional: {{ not .Values.secrets.create }}
            - name: BACKENDS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.name }}
                  key: BACKENDS
                  optional: {{ not .Values.secrets.create }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.name }}
                  key: DATABASE_URL
                  optional: {{ not .Values.secrets.create }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.probes.enabled }}
          readinessProbe:
            {{- toYaml .Values.probes.readiness | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.probes.liveness | nindent 12 }}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
